name: Build Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./translate/manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build snapshot zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd translate
          bash package.sh

      - name: Upload snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot
          name: TransLens Snapshot
          body: |
            自动构建的最新开发版，每次 push 到 main 自动更新。
            正式版请查看 [Releases](https://github.com/${{ github.repository }}/releases)。
          prerelease: true
          files: translate/TransLens-*.zip
